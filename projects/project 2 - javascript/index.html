<!doctype html>

<html lang="en">
  <head>
    <!-- christopher romo, cs 3110, project 2 -->
    <title>List Creator</title>
    <meta charset="UTF-8" />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="container">
      <img src="logo.png" class="image" alt="list creator" />
      <h2 style="color: cyan"><b>create the list of your dreams</b></h2>
    </div>
    <div class="container">
      <div class="middle-box">
        <h2>fill out these fields to update your list</h2>
        <form id="list-name-form">
          <label><b>list name: </b></label>
          <input id="list-name-form-input-field" type="text" />
          <input type="submit" value="update" />
        </form>
        <p></p>
        <form id="item-form">
          <label><b>item name: </b></label>
          <input id="item-form-input-field" type="text" />
          <input type="submit" value="add" />
        </form>
      </div>
    </div>
    <div class="container">
      <div class="middle-box">
        <h2 id="list-name">my list</h2>
        <div id="the-list"></div>
      </div>
    </div>
    <div class="container">
      <h2 style="color: cyan"><b>christopher romo, CS 3110</b></h2>
      <button id="background-button" type="button">change background</button>
    </div>
    <script src="logic.js"></script>
  </body>
</html>
